<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>{{.Name}}</title>
{{if or .GTMContainerID .GA4MeasurementID}}
<!-- Analytics (GA4/GTM) is CONSENT-GATED: the Google scripts load only after the visitor accepts
     analytics cookies via the banner near </body>. Nothing external loads, and no analytics
     cookies are set, before then. -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }
  window.__CALNODE_GA4 = "{{.GA4MeasurementID}}";
  window.__CALNODE_TRACK = { gtm: "{{.GTMContainerID}}", ga4: "{{.GA4MeasurementID}}", loaded: false };
  // GA4 conversion — only fires once tracking has been consented to and loaded.
  window.ga4Convert = function (isPaid, value, currency, txnId) {
    if (!window.__CALNODE_GA4 || !window.__CALNODE_TRACK.loaded) return;
    gtag('event', isPaid ? 'purchase' : 'generate_lead', {
      transaction_id: txnId || '',
      value: value || 0,
      currency: (currency || 'USD').toUpperCase()
    });
  };
  // Injects the real GA4/GTM scripts. Called only on consent (banner Accept, or a stored prior
  // Accept). Idempotent.
  window.__calnodeLoadTracking = function () {
    var t = window.__CALNODE_TRACK; if (!t || t.loaded) return; t.loaded = true;
    if (t.gtm) { (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer',t.gtm); }
    if (t.ga4) { var s=document.createElement('script'); s.async=true; s.src='https://www.googletagmanager.com/gtag/js?id='+t.ga4; document.head.appendChild(s); gtag('js', new Date()); gtag('config', t.ga4); }
  };
</script>
{{end}}
{{.HeadHTML}}
{{if .DataLayerEnabled}}
<script>
  window.dataLayer = window.dataLayer || [];
  window.__CALNODE_DL = { fields: {{.DataLayerFields}}, questions: {{.QuestionsJSON}} };
  function calnodePush(eventName, data) {
    if (!window.__CALNODE_DL) return;
    var out = { event: eventName };
    (window.__CALNODE_DL.fields || []).forEach(function (k) {
      var v = data[k];
      if (v !== undefined && v !== null && v !== '') out[k] = v;
    });
    (window.dataLayer = window.dataLayer || []).push(out);
  }
</script>
{{end}}
<link rel="stylesheet" href="/booking.css?v={{.CSSVersion}}">
<style>
/* Page chrome (body/footer) + page-level responsive + mobile step-flow. The card /
   calendar / slots / form visual primitives come from the shared /booking.css above
   (the same sheet the embed widget loads), so the two never drift. */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: #f3f4f6;
  color: #111827;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1rem 2rem;
  gap: 1.25rem;
}

.powered-by a {
  display: inline-flex;
  align-items: center;
  gap: .375rem;
  color: #111827;
  text-decoration: none;
  font-size: .75rem;
  font-weight: 600;
  transition: opacity .12s;
}
.powered-by a:hover { opacity: .6; }

/* #tz-sizer is page-specific (the timezone <select> auto-sizer). */
#tz-sizer {
  position: absolute;
  visibility: hidden;
  white-space: nowrap;
  font-size: .6875rem;
  font-family: inherit;
}

/* Mobile back-to-calendar button (step-flow); hidden on desktop. */
.cal-back { display: none; }

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 700px) {
  body { padding: 0 0 1.5rem; align-items: center; gap: 1rem; }
  .card { flex-direction: column; border-radius: 0; box-shadow: none; min-height: calc(100vh - 3rem); width: 100%; }
  .info { width: 100%; border-right: none; border-bottom: 1px solid #e5e7eb; padding: 1.25rem 1rem; }
  .info .host-faces { margin-bottom: .25rem; }
  /* Full-width info panel: lay duration + location on one line (matches the embed widget). */
  .meta { flex-direction: row; flex-wrap: wrap; gap: .35rem .9rem; margin-top: .75rem; }
  .cal-col { border-right: none; border-bottom: 1px solid #e5e7eb; padding: 1.25rem 1rem; }
  .cal-grid { grid-template-columns: repeat(7, 1fr); width: 100%; }
  .ch, .cd { width: 100%; }
  .right-col { padding: 1.25rem 1rem; }
  /* Step-flow: show one section at a time (calendar ⇄ right pane). */
  .card.m-right .info, .card.m-right .cal-col { display: none; }
  .card.m-cal .right-col { display: none; }
  .cal-back { display: inline-flex; }
}
</style>
</head>
<body>
{{/* GTM <noscript> fallback intentionally omitted — it would load GTM without consent for no-JS visitors, bypassing the cookie gate. */}}

{{if or .LogoURL .BusinessName}}
<header style="text-align:center;padding:24px 16px 4px;">
  {{if .LogoURL}}<img src="{{.LogoURL}}" alt="{{.BusinessName}}" style="height:{{.LogoHeight}}px;width:auto;max-width:100%;opacity:{{.LogoOpacity}};display:inline-block;border:0;">{{else}}<span style="font-size:.9375rem;font-weight:600;color:#111827;">{{.BusinessName}}</span>{{end}}
</header>
{{end}}

{{if .AssistantEnabled}}
<button type="button" class="asst-fab-btn" id="asst-open" aria-expanded="false" aria-controls="asst-panel">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9.7l-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9L12 3z"/></svg>
  Book by chat
</button>
<div class="asst-panel" id="asst-panel" role="dialog" aria-label="Book by chat" hidden>
  <div class="asst-head">
    <span class="asst-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9.7l-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9L12 3z"/></svg>
      Book by chat
    </span>
    <button type="button" class="asst-close" id="asst-close" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="asst-log" id="asst-log" aria-live="polite">
    <div class="asst-msg bot">Hi! Tell me roughly when you'd like to meet — e.g. "Tuesday afternoon" or "next week" — and I'll find a time. You can always use the calendar instead.</div>
  </div>
  <form class="asst-row" id="asst-form" autocomplete="off">
    <input class="asst-input" id="asst-input" type="text" placeholder="Type when you're free…" aria-label="Message the booking assistant" maxlength="500">
    <button class="asst-send" id="asst-send" type="submit">Send</button>
  </form>
</div>
{{end}}

<div class="card">

  <!-- Info panel -->
  <aside class="info">
    <div id="host-faces" class="host-faces">
      {{range .Hosts}}
      <span class="face" style="z-index:{{.Z}}">
        {{if .AvatarURL}}
        <img src="{{.AvatarURL}}" alt="{{.Name}}" class="avatar-img">
        {{else}}
        <span class="avatar-initials">{{.Initial}}</span>
        {{end}}
      </span>
      {{end}}
    </div>
    <p id="host-name" class="host-name">{{.HostsLabel}}</p>
    <h1 class="event-name">{{.Name}}</h1>
    <ul class="meta">
      <li>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        {{.DurationLabel}}
      </li>
      <li>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        {{.LocationLabel}}
      </li>
      {{if .PriceLabel}}
      <li>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        {{.PriceLabel}}
      </li>
      {{end}}
    </ul>
    {{if .AssistantEnabled}}
    <button type="button" class="asst-link" id="asst-open-inline">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9.7l-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9L12 3z"/></svg>
      Book by chat
      <svg class="asst-link-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
    </button>
    {{end}}
    {{if .Description}}<div class="description">{{.Description}}</div>
    <button type="button" class="desc-toggle" id="desc-toggle">Show more</button>{{end}}
  </aside>

  <!-- Calendar column -->
  <section class="cal-col" aria-label="Date picker">
    <div class="cal-nav">
      <span id="month-label" class="month-label" aria-live="polite"></span>
      <button id="prev-btn" aria-label="Previous month">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="next-btn" aria-label="Next month">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="cal" class="cal-grid" role="grid"></div>
    <p class="tz-label">
      <span class="tz-wrapper">
        <select id="tz-select" aria-label="Timezone"></select>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span id="tz-sizer" aria-hidden="true"></span>
    </p>
  </section>

  <!-- Right column -->
  <section class="right-col" aria-live="polite">

    <!-- Empty state (before a day is chosen) -->
    <p id="empty-hint" class="hint">Select a day to see available times.</p>

    <!-- Slots -->
    <div id="slots-view" class="hidden">
      <button class="back-btn cal-back" id="cal-back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <p class="slots-header" id="slots-date"></p>
      <div id="slots-list" class="slots-list"></div>
    </div>

    <!-- Form -->
    <div id="form-view" class="hidden">
      <button class="back-btn" id="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <p class="slot-label" id="form-slot-label"></p>
      <form id="booking-form" novalidate>
        <!-- Honeypot: hidden from humans (off-screen, not tabbable); a bot that fills
             "company" is rejected server-side. Real submissions leave it empty. -->
        <div aria-hidden="true" style="position:absolute;left:-5000px;height:0;width:0;overflow:hidden;">
          <label>Company<input id="f-company" name="company" type="text" tabindex="-1" autocomplete="off"></label>
        </div>
        <div class="field">
          <label for="f-name">Name</label>
          <input id="f-name" name="name" type="text" required autocomplete="name" placeholder="Your full name">
        </div>
        <div class="field">
          <label for="f-email">Email</label>
          <input id="f-email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        {{range .Questions}}
        <div class="field" data-qid="{{.ID}}" data-required="{{if .Required}}true{{else}}false{{end}}">
          {{if eq .QType "checkbox"}}
          <div class="field-checkbox">
            <input id="ans-{{.ID}}" name="ans-{{.ID}}" type="checkbox">
            <label for="ans-{{.ID}}">{{.Label}}{{if .Required}} <span class="required-star">*</span>{{end}}</label>
          </div>
          {{else if eq .QType "select"}}
          <label for="ans-{{.ID}}">{{.Label}}{{if .Required}} <span class="required-star">*</span>{{end}}</label>
          <select id="ans-{{.ID}}" name="ans-{{.ID}}"{{if .Required}} required{{end}}>
            <option value="">Choose an option</option>
            {{range .Options}}<option value="{{.}}">{{.}}</option>{{end}}
          </select>
          {{else}}
          <label for="ans-{{.ID}}">{{.Label}}{{if .Required}} <span class="required-star">*</span>{{end}}</label>
          <input id="ans-{{.ID}}" name="ans-{{.ID}}" type="text"{{if .Required}} required{{end}}>
          {{end}}
        </div>
        {{end}}
        <p id="form-error" class="form-error" role="alert"></p>
        <button type="submit" id="submit-btn" class="btn-primary">Confirm booking</button>
      </form>
    </div>

    <!-- Confirmation -->
    <div id="confirm-view" class="hidden">
      <div class="confirm-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="confirm-view">
        <h3>Booking confirmed</h3>
        <p class="when" id="confirm-time"></p>
        <p class="sub">A confirmation email has been sent to you.</p>
      </div>
    </div>

  </section>
</div>

<footer class="powered-by">
  <a href="https://calnode.com" target="_blank" rel="noopener noreferrer">Calnode</a>
  {{if or .GTMContainerID .GA4MeasurementID}}<button type="button" class="cookie-link" onclick="window.__calnodeOpenConsent && window.__calnodeOpenConsent()">Cookie settings</button>{{end}}
</footer>

<!-- Shared booking-calendar logic (booking-logic.js), inlined ahead of the page script -->
<script>{{.BookingLogicJS}}</script>
<script>
(function () {
  'use strict';

  const SLUG     = "{{.Slug}}";
  const MAX_DAYS = {{.MaxFutureDays}};
  const PRICE_CENTS = {{.PriceCents}};
  const CURRENCY = "{{.Currency}}";
  const EVENT_NAME = {{.Name}};
  let TZ         = Intl.DateTimeFormat().resolvedOptions().timeZone;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const maxDate = MAX_DAYS > 0 ? new Date(today.getTime() + MAX_DAYS * 86400000) : null;

  let navYear = today.getFullYear(), navMonth = today.getMonth();
  let pickedDate = null, slotsCache = [], pickedSlot = null;
  let availableDates = new Set(); // "YYYY-MM-DD" strings with ≥1 slot this nav month
  let availabilityLoaded = false; // false = render optimistically (assume all days open)
  let slotsByDay = {};            // "YYYY-MM-DD" -> [slot]; cached from the month fetch

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2, '0');

  // ── Host faces ──────────────────────────────────────────────────────────────
  // hostMeta maps host id → {name, avatar_url}, accumulated from /slots responses.
  // The default face(s) are server-rendered; on slot-pick we swap to the host(s)
  // that slot's host_ids resolve to (round-robin: the priority pick; group: all).
  let hostMeta = {};
  const facesEl = $('host-faces'), nameEl = $('host-name');
  const defaultFacesHTML = facesEl ? facesEl.innerHTML : '';
  const defaultName = nameEl ? nameEl.textContent : '';

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function firstName(name) { return String(name).split(' ')[0]; }
  function hostsLabel(metas) {
    const n = metas.length;
    if (n === 0) return '';
    if (n === 1) return metas[0].name;
    if (n === 2) return `${firstName(metas[0].name)} & ${firstName(metas[1].name)}`;
    if (n === 3) return `${firstName(metas[0].name)}, ${firstName(metas[1].name)} & ${firstName(metas[2].name)}`;
    return `${firstName(metas[0].name)}, ${firstName(metas[1].name)}, ${firstName(metas[2].name)} & ${n - 3} ${n - 3 === 1 ? 'other' : 'others'}`;
  }
  function faceHTML(m, z) {
    const inner = m.avatar_url
      ? `<img src="${esc(m.avatar_url)}" alt="${esc(m.name)}" class="avatar-img">`
      : `<span class="avatar-initials">${esc((m.name || '?').charAt(0))}</span>`;
    return `<span class="face" style="z-index:${z}">${inner}</span>`;
  }
  function renderHosts(ids) {
    if (!facesEl) return;
    const metas = (ids || []).map(id => hostMeta[id]).filter(Boolean);
    if (!metas.length) return; // unknown — keep whatever's shown
    const n = metas.length;
    facesEl.innerHTML = metas.map((m, i) => faceHTML(m, (n - i) * 10)).join('');
    nameEl.textContent = hostsLabel(metas);
  }
  function restoreDefaultHosts() {
    if (!facesEl) return;
    facesEl.innerHTML = defaultFacesHTML;
    nameEl.textContent = defaultName;
  }

  function fmtTime(iso) { return BookingLogic.formatTime(iso, TZ); }
  function fmtDate(d) {
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }
  function toDateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

  function showView(id) {
    ['slots-view', 'form-view', 'confirm-view'].forEach(v =>
      $(v).classList.toggle('hidden', v !== id)
    );
  }

  // Returning from Stripe Checkout (success_url): the payment was captured and the booking
  // is confirmed by webhook. Show a payment-received confirmation instead of the picker.
  (function () {
    var params = new URLSearchParams(window.location.search);
    if (params.get('paid') !== '1') return;
    var _ch3 = document.querySelector('#confirm-view h3');
    var _csub = document.querySelector('#confirm-view .sub');
    if (_ch3) _ch3.textContent = 'Payment received';
    if (_csub) _csub.textContent = 'Your booking is confirmed — a confirmation email is on its way.';
    showView('confirm-view');
    // Fire the conversion event for paid bookings too (the form-submit path redirected to
    // Stripe before it could). transaction_id lets GA4/GTM dedupe on refresh.
    if (window.__CALNODE_DL && typeof calnodePush === 'function') {
      calnodePush('calnode_booking_confirmed', {
        event_type_slug: SLUG,
        event_type_name: EVENT_NAME,
        status: 'confirmed',
        is_paid: true,
        value: PRICE_CENTS / 100,
        currency: (CURRENCY || 'usd').toUpperCase(),
        transaction_id: params.get('session_id') || '',
      });
    }
    if (typeof ga4Convert === 'function') ga4Convert(true, PRICE_CENTS / 100, CURRENCY, params.get('session_id'));
  })();

  // ── Mobile step-flow ────────────────────────────────────────────────────────
  // On narrow viewports (CSS-gated) we show one section at a time: calendar, then
  // the right pane (slots → form → confirm). On desktop the classes are inert.
  const cardEl = document.querySelector('.card');
  function setStep(s) {
    if (!cardEl) return;
    cardEl.classList.toggle('m-cal', s === 'cal');
    cardEl.classList.toggle('m-right', s === 'right');
  }
  setStep('cal');

  // ── Description clamp + "Show more" ─────────────────────────────────────────
  // Clamp to 2 lines only in constrained layouts (where the 3 columns can't fit);
  // the toggle shows only when the text actually overflows the clamp.
  const descEl = document.querySelector('.description');
  const descToggle = $('desc-toggle');
  let descExpanded = false;
  function syncDesc() {
    if (!descEl || !descToggle) return;
    if (window.innerWidth > 700) { // full 3-column layout → no clamp
      descEl.classList.remove('clamp');
      descToggle.classList.remove('visible');
      return;
    }
    if (descExpanded) {
      descEl.classList.remove('clamp');
      descToggle.textContent = 'Show less';
      descToggle.classList.add('visible');
      return;
    }
    descEl.classList.add('clamp');
    descToggle.textContent = 'Show more';
    descToggle.classList.toggle('visible', descEl.scrollHeight > descEl.clientHeight + 1);
  }
  if (descToggle) descToggle.addEventListener('click', () => { descExpanded = !descExpanded; syncDesc(); });
  window.addEventListener('resize', syncDesc);
  syncDesc();

  // ── Calendar ──────────────────────────────────────────────────────────────
  // Week starts Monday (index 1). Days: Mo Tu We Th Fr Sa Su
  const DOW_LABELS = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];

  function dowIndex(date) { return BookingLogic.dowIndex(date); } // 0=Mon…6=Sun

  async function loadMonthAvailability(y, m) {
    // Render immediately, treating every in-window day as available, so the
    // calendar paints without waiting on the (network-bound) slots fetch; refine
    // once it returns to grey out days that have no slots.
    availabilityLoaded = false;
    renderCal();
    const from = toDateStr(y, m, 1);
    const lastDay = new Date(y, m + 1, 0).getDate();
    const to   = toDateStr(y, m, lastDay);
    try {
      const r = await fetch(`/v1/event-types/${SLUG}/slots?from=${from}&to=${to}&tz=${encodeURIComponent(TZ)}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      Object.assign(hostMeta, data.hosts || {});
      // Cache the whole month's slots grouped by the SELECTED-timezone day (BookingLogic — tested,
      // and tz-correct: the old new Date().toLocaleDateString keyed off the browser tz) so clicking
      // a day is instant; availableDates falls out of the keys.
      slotsByDay = BookingLogic.groupSlotsByDay(data.slots, TZ);
      availableDates = new Set(Object.keys(slotsByDay));
    } catch {
      slotsByDay = {};
      availableDates = new Set();
    }
    availabilityLoaded = true;
    renderCal();
  }

  function renderCal() {
    const first = new Date(navYear, navMonth, 1);
    const daysInMonth = new Date(navYear, navMonth + 1, 0).getDate();
    const startOffset = dowIndex(first); // 0=Mon offset

    $('month-label').textContent =
      first.toLocaleDateString([], { month: 'long', year: 'numeric' });

    const thisMonFirst = new Date(today.getFullYear(), today.getMonth(), 1);
    const navFirst     = new Date(navYear, navMonth, 1);
    $('prev-btn').disabled = navFirst <= thisMonFirst;
    $('next-btn').disabled = maxDate
      ? navFirst >= new Date(maxDate.getFullYear(), maxDate.getMonth(), 1)
      : false;

    let h = DOW_LABELS.map(d => `<div class="ch">${d}</div>`).join('');
    for (let i = 0; i < startOffset; i++) h += '<div></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const date     = new Date(navYear, navMonth, d);
      const past     = date < today;
      const tooFar   = maxDate && date > maxDate;
      const disabled = past || tooFar;
      const isToday  = date.toDateString() === today.toDateString();
      const isSel    = pickedDate && date.toDateString() === pickedDate.toDateString();

      const ds = toDateStr(navYear, navMonth, d);
      const hasSlots = !availabilityLoaded || availableDates.has(ds);

      let cls = 'cd';
      if (!disabled && hasSlots) cls += ' available';
      if (isSel)                 cls += ' sel';
      if (isToday)               cls += ' today';

      if (disabled || !hasSlots) {
        h += `<button class="${cls}" disabled>${d}</button>`;
      } else {
        h += `<button class="${cls}" data-ds="${ds}" data-y="${navYear}" data-m="${navMonth}" data-d="${d}">${d}</button>`;
      }
    }

    $('cal').innerHTML = h;
  }

  $('prev-btn').addEventListener('click', () => {
    if (navMonth-- === 0) { navMonth = 11; navYear--; }
    loadMonthAvailability(navYear, navMonth);
  });
  $('next-btn').addEventListener('click', () => {
    if (navMonth++ === 11) { navMonth = 0; navYear++; }
    loadMonthAvailability(navYear, navMonth);
  });

  $('cal').addEventListener('click', e => {
    const btn = e.target.closest('.cd');
    if (!btn || btn.disabled) return;
    pickDate(btn.dataset.ds, +btn.dataset.y, +btn.dataset.m, +btn.dataset.d);
  });

  // ── Date pick ─────────────────────────────────────────────────────────────
  function fillSlots(list) {
    if (!slotsCache.length) {
      list.innerHTML = '<p class="hint">No available times.</p>';
      return;
    }
    list.innerHTML = slotsCache.map((s, i) =>
      `<button class="slot-btn" data-i="${i}">${fmtTime(s.start)}</button>`
    ).join('');
  }

  async function pickDate(ds, y, m, d) {
    pickedDate = new Date(y, m, d);
    pickedSlot = null;
    restoreDefaultHosts();
    renderCal();
    $('empty-hint').classList.add('hidden');
    showView('slots-view');
    setStep('right');
    $('slots-date').textContent = fmtDate(pickedDate);
    const list = $('slots-list');

    // Instant: the month fetch already cached this day's slots.
    if (slotsByDay[ds]) {
      slotsCache = slotsByDay[ds];
      fillSlots(list);
      return;
    }
    // Fallback (clicked before the month load finished): fetch just this day.
    list.innerHTML = '<p class="hint">Loading…</p>';
    try {
      const r = await fetch(`/v1/event-types/${SLUG}/slots?from=${ds}&to=${ds}&tz=${encodeURIComponent(TZ)}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      Object.assign(hostMeta, data.hosts || {});
      slotsCache = data.slots || [];
      fillSlots(list);
    } catch {
      list.innerHTML = '<p class="hint" style="color:#dc2626">Could not load times. Please try again.</p>';
    }
  }

  $('slots-list').addEventListener('click', e => {
    const btn = e.target.closest('.slot-btn');
    if (!btn) return;
    pickSlot(+btn.dataset.i);
  });

  // ── Slot pick ─────────────────────────────────────────────────────────────
  function pickSlot(i) {
    if (i < 0 || i >= slotsCache.length) return;
    pickedSlot = slotsCache[i];
    renderHosts(pickedSlot.host_ids);
    document.querySelectorAll('.slot-btn').forEach((b, j) =>
      b.classList.toggle('sel', j === i)
    );
    $('form-slot-label').textContent = `${fmtDate(pickedDate)} · ${fmtTime(pickedSlot.start)}`;
    showView('form-view');
  }

  $('back-btn').addEventListener('click', () => showView('slots-view'));
  $('cal-back-btn').addEventListener('click', () => setStep('cal'));

  // ── Booking form ──────────────────────────────────────────────────────────
  $('booking-form').addEventListener('submit', async e => {
    e.preventDefault();
    if (!pickedSlot) return;
    const form  = e.target;
    const btn   = $('submit-btn');
    const errEl = $('form-error');

    if (!form.name.value.trim() || !form.email.value.trim()) {
      errEl.textContent = 'Please fill in all required fields.';
      return;
    }

    // Collect intake question answers and validate required fields.
    const answers = [];
    const qEls = document.querySelectorAll('[data-qid]');
    for (let i = 0; i < qEls.length; i++) {
      const el = qEls[i];
      const input = el.querySelector('input, select');
      if (!input) continue;
      let value;
      if (input.type === 'checkbox') {
        value = input.checked ? 'yes' : 'no';
      } else {
        value = input.value.trim();
      }
      if (el.dataset.required === 'true' && input.type !== 'checkbox' && !value) {
        errEl.textContent = 'Please fill in all required fields.';
        return;
      }
      answers.push({ question_id: el.dataset.qid, value });
    }

    btn.disabled = true; btn.textContent = 'Confirming…'; errEl.textContent = '';

    try {
      const r = await fetch('/v1/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event_type_slug: SLUG,
          start_at: pickedSlot.start,
          name: form.name.value.trim(),
          email: form.email.value.trim(),
          timezone: TZ,
          company: form.company.value,
          answers,
        }),
      });

      if (r.status === 409) {
        errEl.textContent = 'That slot was just taken. Please choose another time.';
        const ds = toDateStr(pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
        await pickDate(ds, pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
        btn.disabled = false; btn.textContent = 'Confirm booking';
        return;
      }

      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        errEl.textContent = data.error || 'Booking failed. Please try again.';
        btn.disabled = false; btn.textContent = 'Confirm booking';
        return;
      }

      // Show the exact host(s) actually assigned (the response is authoritative —
      // matters for round-robin 'even', and includes any optional Group hosts who
      // joined). Falls back to the slot's best-effort face if the body is unusable.
      const booked = await r.json().catch(() => null);
      // Paid event types: the server holds the slot and returns a Stripe Checkout URL —
      // redirect there to pay. The booking is confirmed by webhook once payment completes.
      if (booked && booked.checkout_url) { window.location.href = booked.checkout_url; return; }
      if (booked && Array.isArray(booked.hosts) && booked.hosts.length) {
        booked.hosts.forEach(h => { hostMeta[h.id] = { name: h.name, avatar_url: h.avatar_url || '' }; });
        renderHosts(booked.hosts.map(h => h.id));
      }

      $('confirm-time').textContent = `${fmtDate(pickedDate)} · ${fmtTime(pickedSlot.start)}`;
      showView('confirm-view');

      if (window.__CALNODE_DL && typeof calnodePush === 'function') {
        var dlAnswers = {};
        (answers || []).forEach(function (a) {
          var label = (window.__CALNODE_DL.questions || {})[a.question_id] || a.question_id;
          dlAnswers[label] = a.value;
        });
        calnodePush('calnode_booking_confirmed', {
          booking_id: booked && booked.id,
          event_type_slug: SLUG,
          event_type_name: EVENT_NAME,
          start_at: pickedSlot.start,
          end_at: pickedSlot.end,
          status: 'confirmed',
          location: (booked && booked.location_value) || '',
          host_name: (booked && Array.isArray(booked.hosts)) ? booked.hosts.map(function (h) { return h.name; }).join(', ') : '',
          attendee_name: form.name.value.trim(),
          attendee_email: form.email.value.trim(),
          attendee_timezone: TZ,
          answers: dlAnswers,
          is_paid: false,
          value: PRICE_CENTS / 100,
          currency: (CURRENCY || 'usd').toUpperCase(),
        });
      }
      if (typeof ga4Convert === 'function') ga4Convert(false, PRICE_CENTS / 100, CURRENCY, booked && booked.id);

      // Booking succeeded. Re-enable the button so a second booking attempt in the
      // same session (before the page is refreshed) isn't silently blocked by a
      // button left disabled from this success. Every error path already resets it;
      // the success path didn't, which is what left it stuck on "Confirming…".
      // The server enforces the per-invitee active-booking cap and returns a clear
      // message, so the resubmit surfaces that instead of hanging.
      btn.disabled = false; btn.textContent = 'Confirm booking';

    } catch {
      errEl.textContent = 'Network error. Please check your connection.';
      btn.disabled = false; btn.textContent = 'Confirm booking';
    }
  });

  // ── Timezone selector ─────────────────────────────────────────────────────
  function resizeTzSelect() {
    const sel = $('tz-select');
    const sizer = $('tz-sizer');
    sizer.textContent = sel.options[sel.selectedIndex]?.text || '';
    sel.style.width = sizer.offsetWidth + 'px';
  }

  function populateTzSelect() {
    const sel = $('tz-select');
    const zones = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : [TZ];
    const groups = {};
    zones.forEach(tz => {
      const region = tz.includes('/') ? tz.split('/')[0] : 'Other';
      (groups[region] = groups[region] || []).push(tz);
    });
    Object.keys(groups).sort().forEach(region => {
      const og = document.createElement('optgroup');
      og.label = region;
      groups[region].forEach(tz => {
        const opt = document.createElement('option');
        opt.value = tz;
        opt.textContent = tz.replace(/_/g, ' ');
        if (tz === TZ) opt.selected = true;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    resizeTzSelect();
  }

  $('tz-select').addEventListener('change', async e => {
    TZ = e.target.value;
    resizeTzSelect();
    await loadMonthAvailability(navYear, navMonth); // rebuild the day cache for the new tz
    if (pickedDate) {
      const ds = toDateStr(pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
      await pickDate(ds, pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  populateTzSelect();
  loadMonthAvailability(navYear, navMonth);

}());
</script>

{{if .AssistantEnabled}}
<script>
(function () {
  'use strict';
  var SLUG = "{{.Slug}}";
  var form = document.getElementById('asst-form');
  if (!form) return;
  var input   = document.getElementById('asst-input');
  var send    = document.getElementById('asst-send');
  var log     = document.getElementById('asst-log');
  var panel   = document.getElementById('asst-panel');
  var openBtn = document.getElementById('asst-open');
  var closeBtn = document.getElementById('asst-close');
  var messages = [];   // [{role:'user'|'assistant', content}] — conversation state
  var busy = false;

  function tz() {
    var s = document.getElementById('tz-select');
    return (s && s.value) ? s.value : Intl.DateTimeFormat().resolvedOptions().timeZone;
  }
  function add(text, cls) {
    var d = document.createElement('div');
    d.className = 'asst-msg ' + cls;
    d.textContent = text;               // textContent, not innerHTML → no injection
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
    return d;
  }

  function openPanel() {
    panel.hidden = false; openBtn.hidden = true;
    openBtn.setAttribute('aria-expanded', 'true');
    input.focus();
  }
  function closePanel() {
    panel.hidden = true; openBtn.hidden = false;
    openBtn.setAttribute('aria-expanded', 'false');
  }
  openBtn.addEventListener('click', openPanel);
  closeBtn.addEventListener('click', closePanel);
  var inlineBtn = document.getElementById('asst-open-inline');
  if (inlineBtn) inlineBtn.addEventListener('click', function () {
    if (panel.hidden) openPanel(); else closePanel();
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !panel.hidden) closePanel(); });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var text = (input.value || '').trim();
    if (!text || busy) return;
    messages.push({ role: 'user', content: text });
    add(text, 'user');
    input.value = ''; busy = true; send.disabled = true;
    var typing = add('…', 'asst-typing');
    var botEl = null, booking = null;
    function onEvent(obj) {
      if (obj.type === 'token') {
        if (!botEl) { typing.remove(); botEl = add('', 'bot'); }
        botEl.textContent += obj.text;
        log.scrollTop = log.scrollHeight;
      } else if (obj.type === 'status') {
        typing.textContent = obj.text;          // "Checking availability…"
      } else if (obj.type === 'fallback') {
        if (typing.parentNode) typing.remove();
        add(obj.text, 'note');
      } else if (obj.type === 'done') {
        booking = obj.booking || null;
      }
    }
    try {
      var res = await fetch('/v1/event-types/' + encodeURIComponent(SLUG) + '/assistant', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ messages: messages, timezone: tz() })
      });
      if (!res.ok || !res.body) throw new Error('http ' + res.status);
      // Read the SSE stream: events are "data: <json>\n\n".
      var reader = res.body.getReader(), dec = new TextDecoder(), buf = '';
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += dec.decode(chunk.value, { stream: true });
        var parts = buf.split('\n\n'); buf = parts.pop();
        for (var i = 0; i < parts.length; i++) {
          var line = parts[i].trim();
          if (line.indexOf('data:') !== 0) continue;
          try { onEvent(JSON.parse(line.slice(5).trim())); } catch (_) {}
        }
      }
      if (typing.parentNode) typing.remove();
      if (botEl && botEl.textContent) {
        messages.push({ role: 'assistant', content: botEl.textContent });
        if (booking) botEl.className = 'asst-msg ok';
      }
      if (booking && typeof calnodePush === 'function') {
        calnodePush('calnode_booking_confirmed', { booking_id: booking.id, via: 'assistant' });
      }
      if (booking && typeof ga4Convert === 'function') ga4Convert(false, 0, '', booking.id);
    } catch (err) {
      if (typing.parentNode) typing.remove();
      add('Sorry — something went wrong. Please use the calendar below.', 'note');
    } finally {
      busy = false; send.disabled = false; input.focus();
    }
  });
}());
</script>
{{end}}

<div id="cookie-banner" class="cookie-banner" hidden role="dialog" aria-label="Cookie consent">
  <p class="cookie-text">We use analytics cookies to understand how this booking page is used — set only if you accept.</p>
  <div class="cookie-actions">
    <button id="cookie-decline" type="button" class="cookie-btn">Decline</button>
    <button id="cookie-accept" type="button" class="cookie-btn cookie-btn-primary">Accept</button>
  </div>
</div>
<script>
(function () {
  var T = window.__CALNODE_TRACK;
  if (!T || (!T.gtm && !T.ga4)) return;
  var NAME = 'calnode_consent', VERSION = 1;
  function read() {
    var m = document.cookie.match(/(?:^|;\s*)calnode_consent=([^;]+)/);
    if (!m) return null; try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return null; }
  }
  function write(yes) {
    var v = encodeURIComponent(JSON.stringify({ a: yes ? 1 : 0, v: VERSION, t: Date.now() }));
    var exp = new Date(Date.now() + 1000 * 60 * 60 * 24 * 180).toUTCString();
    document.cookie = NAME + '=' + v + '; expires=' + exp + '; path=/; SameSite=Lax' + (location.protocol === 'https:' ? '; Secure' : '');
  }
  function clearGA() {
    document.cookie.split(';').forEach(function (c) {
      var n = c.split('=')[0].trim();
      if (/^_ga|^_gid|^_gat/.test(n)) {
        document.cookie = n + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
        document.cookie = n + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.' + location.hostname;
      }
    });
  }
  var banner = document.getElementById('cookie-banner');
  window.__calnodeOpenConsent = function () { if (banner) banner.hidden = false; };
  function hide() { if (banner) banner.hidden = true; }
  var ok = document.getElementById('cookie-accept'), no = document.getElementById('cookie-decline');
  if (ok) ok.onclick = function () { write(true); hide(); if (window.__calnodeLoadTracking) window.__calnodeLoadTracking(); };
  if (no) no.onclick = function () { write(false); hide(); clearGA(); };
  var c = read();
  if (c && c.v === VERSION) {
    if (c.a && window.__calnodeLoadTracking) window.__calnodeLoadTracking();
  } else {
    window.__calnodeOpenConsent();
  }
}());
</script>
