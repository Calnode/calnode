<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Name}}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: #f3f4f6;
  color: #111827;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2.5rem 1rem;
}

/* ── Card ────────────────────────────────────────── */
.card {
  display: flex;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.1);
  overflow: hidden;
  width: 100%;
  max-width: 860px;
}

/* ── Info panel ──────────────────────────────────── */
.info {
  width: 240px;
  flex-shrink: 0;
  padding: 2rem 1.5rem;
  border-right: 1px solid #e5e7eb;
}
.host-name  { font-size: .8125rem; color: #6b7280; margin-bottom: .375rem; }
.event-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
.meta       { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
.meta li    { display: flex; align-items: center; gap: .5rem; font-size: .8125rem; color: #4b5563; }
.meta svg   { flex-shrink: 0; color: #9ca3af; }
.description { margin-top: 1rem; font-size: .8125rem; color: #6b7280; line-height: 1.65; }

/* ── Calendar column ─────────────────────────────── */
.cal-col {
  flex: 0 0 auto;
  padding: 2rem 1.5rem 2rem 2rem;
  border-right: 1px solid #e5e7eb;
}
.col-title {
  font-size: .9375rem;
  font-weight: 600;
  margin-bottom: 1.25rem;
  color: #111827;
}

.cal-nav {
  display: flex;
  align-items: center;
  margin-bottom: 1rem;
  gap: .5rem;
}
.cal-nav button {
  width: 28px; height: 28px;
  border: 1px solid #e5e7eb;
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
  color: #6b7280;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
  flex-shrink: 0;
}
.cal-nav button:hover:not(:disabled) { background: #f9fafb; color: #111827; }
.cal-nav button:disabled { opacity: .3; cursor: default; }
#month-label {
  flex: 1;
  font-size: .9375rem;
  font-weight: 600;
  color: #111827;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 40px);
  gap: 2px;
}
.ch {
  width: 40px; height: 28px;
  text-align: center;
  font-size: .6875rem;
  font-weight: 500;
  color: #9ca3af;
  display: flex; align-items: center; justify-content: center;
}
.cd {
  width: 40px; height: 40px;
  border: none; background: none;
  border-radius: 8px;
  font-size: .875rem;
  color: #374151;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s;
  position: relative;
}
.cd.available { background: #f3f4f6; }
.cd.available:hover { background: #e5e7eb; }
.cd.sel { background: #111827 !important; color: #fff !important; font-weight: 600; }
.cd.today::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
}
.cd.sel.today::after { background: #fff; }
.cd:disabled { color: #d1d5db; cursor: default; background: none !important; }

.tz-label {
  margin-top: .875rem;
  font-size: .6875rem;
  color: #9ca3af;
}

/* ── Right column ────────────────────────────────── */
.right-col {
  flex: 1;
  min-width: 0;
  padding: 2rem 1.5rem;
}
.hidden { display: none !important; }

/* Slots */
.slots-header { font-size: .9375rem; font-weight: 600; margin-bottom: 1rem; color: #111827; }
.slots-list { display: flex; flex-direction: column; gap: .5rem; max-height: 340px; overflow-y: auto; }
.slot-btn {
  padding: .625rem 1rem;
  border: 1.5px solid #e5e7eb;
  background: #fff;
  border-radius: 8px;
  font-size: .875rem;
  font-weight: 500;
  color: #111827;
  cursor: pointer;
  text-align: center;
  transition: border-color .12s, background .12s;
}
.slot-btn:hover { border-color: #111827; background: #f9fafb; }
.slot-btn.sel   { background: #111827; color: #fff; border-color: #111827; }
.hint { font-size: .8125rem; color: #9ca3af; }

/* Form */
.back-btn {
  display: inline-flex; align-items: center; gap: .25rem;
  background: none; border: none; color: #6b7280;
  cursor: pointer; font-size: .8125rem; margin-bottom: 1rem; padding: 0;
}
.back-btn:hover { color: #111827; }
.slot-label { font-size: .875rem; font-weight: 600; color: #111827; margin-bottom: 1.25rem; }
.field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .75rem; }
.field label { font-size: .75rem; font-weight: 500; color: #6b7280; }
.field input {
  padding: .55rem .75rem;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  font-size: .875rem;
  color: #111827;
  outline: none;
  transition: border-color .12s, box-shadow .12s;
}
.field input:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,.06); }
.btn-primary {
  width: 100%; padding: .675rem 1rem; margin-top: .5rem;
  background: #111827; color: #fff;
  border: none; border-radius: 8px;
  font-size: .9375rem; font-weight: 600;
  cursor: pointer; transition: background .12s;
}
.btn-primary:hover:not(:disabled) { background: #1f2937; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.form-error { font-size: .8125rem; color: #dc2626; margin-top: .375rem; min-height: 1.2em; }

/* Confirmation */
.confirm-icon {
  width: 48px; height: 48px;
  background: #dcfce7;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: .875rem;
}
.confirm-view h3 { font-size: 1rem; font-weight: 700; margin-bottom: .375rem; }
.confirm-view .when { font-size: .875rem; font-weight: 600; color: #111827; margin-bottom: .25rem; }
.confirm-view .sub { font-size: .8125rem; color: #6b7280; }

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 700px) {
  body { padding: 0; align-items: stretch; }
  .card { flex-direction: column; border-radius: 0; box-shadow: none; min-height: 100vh; }
  .info { width: 100%; border-right: none; border-bottom: 1px solid #e5e7eb; padding: 1.25rem 1rem; }
  .cal-col { border-right: none; border-bottom: 1px solid #e5e7eb; padding: 1.25rem 1rem; }
  .cal-grid { grid-template-columns: repeat(7, 1fr); width: 100%; }
  .ch, .cd { width: 100%; }
  .right-col { padding: 1.25rem 1rem; }
}
</style>
</head>
<body>

<div class="card">

  <!-- Info panel -->
  <aside class="info">
    <p class="host-name">{{.HostName}}</p>
    <h1 class="event-name">{{.Name}}</h1>
    <ul class="meta">
      <li>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        {{.DurationLabel}}
      </li>
      <li>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        {{.LocationLabel}}
      </li>
    </ul>
    {{if .Description}}<p class="description">{{.Description}}</p>{{end}}
  </aside>

  <!-- Calendar column -->
  <section class="cal-col" aria-label="Date picker">
    <p class="col-title">Select a date &amp; time</p>
    <div class="cal-nav">
      <span id="month-label" aria-live="polite"></span>
      <button id="prev-btn" aria-label="Previous month">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="next-btn" aria-label="Next month">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="cal" class="cal-grid" role="grid"></div>
    <p class="tz-label" id="tz-label"></p>
  </section>

  <!-- Right column -->
  <section class="right-col" aria-live="polite">

    <!-- Slots -->
    <div id="slots-view" class="hidden">
      <p class="slots-header" id="slots-date"></p>
      <div id="slots-list" class="slots-list"></div>
    </div>

    <!-- Form -->
    <div id="form-view" class="hidden">
      <button class="back-btn" id="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <p class="slot-label" id="form-slot-label"></p>
      <form id="booking-form" novalidate>
        <div class="field">
          <label for="f-name">Name</label>
          <input id="f-name" name="name" type="text" required autocomplete="name" placeholder="Your full name">
        </div>
        <div class="field">
          <label for="f-email">Email</label>
          <input id="f-email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <p id="form-error" class="form-error" role="alert"></p>
        <button type="submit" id="submit-btn" class="btn-primary">Confirm booking</button>
      </form>
    </div>

    <!-- Confirmation -->
    <div id="confirm-view" class="hidden">
      <div class="confirm-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="confirm-view">
        <h3>Booking confirmed</h3>
        <p class="when" id="confirm-time"></p>
        <p class="sub">A confirmation email has been sent to you.</p>
      </div>
    </div>

  </section>
</div>

<script>
(function () {
  'use strict';

  const SLUG     = "{{.Slug}}";
  const MAX_DAYS = {{.MaxFutureDays}};
  const TZ       = Intl.DateTimeFormat().resolvedOptions().timeZone;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const maxDate = MAX_DAYS > 0 ? new Date(today.getTime() + MAX_DAYS * 86400000) : null;

  let navYear = today.getFullYear(), navMonth = today.getMonth();
  let pickedDate = null, slotsCache = [], pickedSlot = null;

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2, '0');

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  function fmtDate(d) {
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }
  function toDateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

  function showView(id) {
    ['slots-view', 'form-view', 'confirm-view'].forEach(v =>
      $(v).classList.toggle('hidden', v !== id)
    );
  }

  // ── Calendar ──────────────────────────────────────────────────────────────
  // Week starts Monday (index 1). Days: Mo Tu We Th Fr Sa Su
  const DOW_LABELS = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];

  function dowIndex(date) {
    // Convert JS 0=Sun…6=Sat → 0=Mon…6=Sun
    return (date.getDay() + 6) % 7;
  }

  function renderCal() {
    const first = new Date(navYear, navMonth, 1);
    const daysInMonth = new Date(navYear, navMonth + 1, 0).getDate();
    const startOffset = dowIndex(first); // 0=Mon offset

    $('month-label').textContent =
      first.toLocaleDateString([], { month: 'long', year: 'numeric' });

    const thisMonFirst = new Date(today.getFullYear(), today.getMonth(), 1);
    const navFirst     = new Date(navYear, navMonth, 1);
    $('prev-btn').disabled = navFirst <= thisMonFirst;
    $('next-btn').disabled = maxDate
      ? navFirst >= new Date(maxDate.getFullYear(), maxDate.getMonth(), 1)
      : false;

    let h = DOW_LABELS.map(d => `<div class="ch">${d}</div>`).join('');
    for (let i = 0; i < startOffset; i++) h += '<div></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const date     = new Date(navYear, navMonth, d);
      const past     = date < today;
      const tooFar   = maxDate && date > maxDate;
      const disabled = past || tooFar;
      const isToday  = date.toDateString() === today.toDateString();
      const isSel    = pickedDate && date.toDateString() === pickedDate.toDateString();

      let cls = 'cd';
      if (!disabled) cls += ' available';
      if (isSel)     cls += ' sel';
      if (isToday)   cls += ' today';

      const ds = toDateStr(navYear, navMonth, d);
      if (disabled) {
        h += `<button class="${cls}" disabled>${d}</button>`;
      } else {
        h += `<button class="${cls}" data-ds="${ds}" data-y="${navYear}" data-m="${navMonth}" data-d="${d}">${d}</button>`;
      }
    }

    $('cal').innerHTML = h;
  }

  $('prev-btn').addEventListener('click', () => {
    if (navMonth-- === 0) { navMonth = 11; navYear--; }
    renderCal();
  });
  $('next-btn').addEventListener('click', () => {
    if (navMonth++ === 11) { navMonth = 0; navYear++; }
    renderCal();
  });

  $('cal').addEventListener('click', e => {
    const btn = e.target.closest('.cd');
    if (!btn || btn.disabled) return;
    pickDate(btn.dataset.ds, +btn.dataset.y, +btn.dataset.m, +btn.dataset.d);
  });

  // ── Date pick ─────────────────────────────────────────────────────────────
  async function pickDate(ds, y, m, d) {
    pickedDate = new Date(y, m, d);
    pickedSlot = null;
    renderCal();
    showView('slots-view');
    $('slots-date').textContent = fmtDate(pickedDate);
    const list = $('slots-list');
    list.innerHTML = '<p class="hint">Loading…</p>';

    try {
      const r = await fetch(`/v1/event-types/${SLUG}/slots?from=${ds}&to=${ds}&tz=${encodeURIComponent(TZ)}`);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      slotsCache = data.slots || [];

      if (!slotsCache.length) {
        list.innerHTML = '<p class="hint">No available times.</p>';
        return;
      }
      list.innerHTML = slotsCache.map((s, i) =>
        `<button class="slot-btn" data-i="${i}">${fmtTime(s.start)}</button>`
      ).join('');
    } catch {
      list.innerHTML = '<p class="hint" style="color:#dc2626">Could not load times. Please try again.</p>';
    }
  }

  $('slots-list').addEventListener('click', e => {
    const btn = e.target.closest('.slot-btn');
    if (!btn) return;
    pickSlot(+btn.dataset.i);
  });

  // ── Slot pick ─────────────────────────────────────────────────────────────
  function pickSlot(i) {
    if (i < 0 || i >= slotsCache.length) return;
    pickedSlot = slotsCache[i];
    document.querySelectorAll('.slot-btn').forEach((b, j) =>
      b.classList.toggle('sel', j === i)
    );
    $('form-slot-label').textContent = `${fmtDate(pickedDate)} · ${fmtTime(pickedSlot.start)}`;
    showView('form-view');
  }

  $('back-btn').addEventListener('click', () => showView('slots-view'));

  // ── Booking form ──────────────────────────────────────────────────────────
  $('booking-form').addEventListener('submit', async e => {
    e.preventDefault();
    if (!pickedSlot) return;
    const form  = e.target;
    const btn   = $('submit-btn');
    const errEl = $('form-error');

    if (!form.name.value.trim() || !form.email.value.trim()) {
      errEl.textContent = 'Please fill in all required fields.';
      return;
    }

    btn.disabled = true; btn.textContent = 'Confirming…'; errEl.textContent = '';

    try {
      const r = await fetch('/v1/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event_type_slug: SLUG,
          start_at: pickedSlot.start,
          name: form.name.value.trim(),
          email: form.email.value.trim(),
          timezone: TZ,
        }),
      });

      if (r.status === 409) {
        errEl.textContent = 'That slot was just taken. Please choose another time.';
        const ds = toDateStr(pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
        await pickDate(ds, pickedDate.getFullYear(), pickedDate.getMonth(), pickedDate.getDate());
        btn.disabled = false; btn.textContent = 'Confirm booking';
        return;
      }

      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        errEl.textContent = data.error || 'Booking failed. Please try again.';
        btn.disabled = false; btn.textContent = 'Confirm booking';
        return;
      }

      $('confirm-time').textContent = `${fmtDate(pickedDate)} · ${fmtTime(pickedSlot.start)}`;
      showView('confirm-view');

    } catch {
      errEl.textContent = 'Network error. Please check your connection.';
      btn.disabled = false; btn.textContent = 'Confirm booking';
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  $('tz-label').textContent = TZ.replace(/_/g, ' ').replace(/\//g, ' / ');
  renderCal();

}());
</script>
</body>
</html>
