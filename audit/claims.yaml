# Calnode — Claims → Verification Manifest
#
# Every public claim we make about Calnode's architecture, security, and privacy,
# mapped to exactly how to verify it against the actual source. This is not a
# certification and not a substitute for your own review — it's a falsifiable index
# so you (or your own LLM/agent) can check each claim in minutes instead of hours.
#
# How to use this file:
#   1. Clone the repo at the commit/tag this file ships with.
#   2. For each claim, run the `verify` commands and/or read the cited files.
#   3. If a claim doesn't hold, it's a bug in our claims (or our code) — please open
#      an issue: https://github.com/Calnode/calnode/issues
#
# See AUDIT.md for the full audit workflow (deterministic scanners + LLM prompt-pack).

version: 1
last_verified: "2026-07-02"
last_verified_commit: "c4c067c"

claims:
  - id: single-binary-no-server-db
    claim: >
      Calnode ships as a single static Go binary with an embedded SQLite database.
      No Postgres, MySQL, or Redis server is required — self-hosting is `docker run`
      or one binary on a VPS.
    verify:
      - "grep -iE 'postgres|mysql|redis' go.mod — expect no matches. The only DB
         driver is modernc.org/sqlite (pure Go, no CGO — the whole reason
         CGO_ENABLED=0 cross-compiles cleanly)."
      - "internal/db/ opens exactly one *sql.DB; see internal/db/db.go."
    status: verified
    caveat: null

  - id: instance-per-tenant-isolation
    claim: >
      One Calnode deployment is one isolated workspace. There is no shared
      multi-tenant database and no cross-tenant data path, because there is no
      tenant model in the code at all — the isolation boundary is the deployment
      itself (a separate binary + SQLite file per customer/workspace).
    verify:
      - "grep -rl 'tenant_id\\|workspace_id' internal/db/migrations/*.sql — expect
         no matches. There's no column to isolate because there's no multi-tenant
         schema in the first place."
      - "Run the tenant-isolation prompt in audit/prompts/prompt-pack.md against
         your own LLM to have it try to find a cross-tenant path and confirm it
         can't."
    status: verified
    caveat: >
      This is an architectural claim, not a runtime access-control claim — it's
      true by the absence of a shared-tenancy code path, not by a permission check
      you could theoretically misconfigure. If you run multiple Calnode instances
      behind one reverse proxy, isolation is exactly as strong as your proxy/network
      config, which is outside Calnode's code.

  - id: meeting-content-egress
    claim: >
      Meeting CONTENT — recorded audio and transcripts — only ever leaves your
      infrastructure to services you explicitly configure: Deepgram (audio, if you
      enable the notetaker) and your own BYO-LLM endpoint (transcript text, for the
      same notetaker's summary step). Nothing carries meeting content by default.
    verify:
      - "grep -rn 'api.deepgram.com' internal/ — the single outbound call site
         that receives recorded audio (internal/stt/deepgram.go). Calnode hands
         Deepgram a presigned, time-limited GET URL into your own bucket rather
         than uploading the file itself — Deepgram's servers fetch it."
      - "internal/handler/notetaker.go — the summarize step sends the full
         transcript text to h.getLLM() (your configured BYO-LLM endpoint), the same
         client used by the conversational booking assistant. See
         internal/llm/client.go."
      - "Recordings themselves go to YOUR OWN S3-compatible bucket (LITESTREAM_*
         env vars), never to Calnode or any third party — see
         internal/handler/livekit_recording.go and migration 00043."
      - "Run the 'trace every outbound network call' prompt in
         audit/prompts/prompt-pack.md for an exhaustive, adversarial check."
    status: verified
    caveat: >
      This claim is scoped to MEETING CONTENT specifically — not to every outbound
      network call an operator chooses to configure. Calnode also talks to other
      third parties for separate, expected, operator/user-initiated integrations
      that carry no meeting content:
        - Calendar sync: Google Calendar, Microsoft Graph/Teams, CalDAV providers
          (iCloud, Fastmail, Nextcloud, etc.) — internal/gcal, internal/calendar.
        - Meeting links: Zoom (per-host OAuth) — meeting metadata only (topic,
          time); Zoom's own infrastructure handles Zoom-call audio, outside
          Calnode's process entirely.
        - Payments: Stripe, for paid bookings.
        - Optional analytics: GA4/GTM, native and consent-gated (see
          cookie-consent-gated-analytics below) — off by default, and even when on,
          carries no meeting content.
      LiveKit (built-in video) is the one integration where "leaves your
      infrastructure" depends entirely on an operator choice made at setup, not a
      Calnode default: if you point it at a self-hosted LiveKit server, live
      meeting audio/video never leaves infrastructure you control. If you point it
      at LiveKit Cloud instead, live meeting media transits LiveKit Cloud's
      infrastructure for the duration of the call — a third party beyond Deepgram/
      your BYO-LLM, and beyond what this claim's headline sentence alone would
      suggest. This is exactly analogous to choosing a self-hosted vs. managed
      database: Calnode's code path is identical either way, but the trust boundary
      is drawn by your own infrastructure choice, not by the code.
      A skeptical reader should verify this list is exhaustive themselves — that's
      exactly what the adversarial prompt above is for.

  - id: admin-frontend-google-fonts
    claim: >
      The admin SvelteKit app (frontend/src/app.html) unconditionally loads a font
      stylesheet from fonts.googleapis.com/fonts.gstatic.com on every /admin/ page
      load, with no operator opt-out. This carries only staff browser metadata
      (IP/User-Agent) — no application, booking, or meeting-content data — and is
      confined to the authenticated admin UI: neither the public booking templates
      (book.html/manage.html) nor the embed widget (embed.js) reference it.
    verify:
      - "grep -n 'fonts.googleapis\\|fonts.gstatic' frontend/src/app.html"
      - "grep -rn 'fonts.googleapis\\|fonts.gstatic' internal/handler/templates/
         internal/handler/embed.js — expect no matches, confirming it's admin-only."
    status: verified
    caveat: >
      This was undocumented until a Layer 2 audit pass flagged it — recorded here
      not because it's a security issue (it isn't: no app data reaches Google, and
      it's staff-only, not visitor-facing) but because an exhaustive egress claim
      should list every third-party call, however low-severity. A privacy-strict or
      air-gapped self-hoster who wants zero third-party calls even from the admin UI
      would need to vendor these fonts locally — not currently offered as a
      built-in toggle.

  - id: envelope-encryption-at-rest
    claim: >
      Secrets at rest (OAuth refresh tokens, API credentials) use envelope
      encryption — a per-secret data-encryption key wrapped by a root key-encryption
      key — not flat single-key AES-GCM.
    verify:
      - "internal/keyvault/keyvault.go — the KEK/DEK implementation."
      - "internal/db/migrations/00017_crypto_keystore.sql — the keystore schema."
      - "CALNODE_ENCRYPTION_KEY / CALNODE_RECOVERY_SECRET env vars — rotation and
         escrow support."
    status: verified
    caveat: null

  - id: recording-consent-aware
    claim: >
      Built-in video recording is consent-aware: every participant gets a notice
      (audio announcement + on-screen prompt) and a Continue/Leave choice when a
      meeting is being recorded, and each decision is logged.
    verify:
      - "internal/db/migrations/00044_meeting_consents.sql — the consent audit log."
      - "assets/livekit-room.js — the notice + Continue/Leave UI, triggered on the
         recording metadata flag."
    status: verified
    caveat: >
      This is a notice-and-choice model (the industry-standard Zoom/Teams/Meet
      pattern), not an affirmative all-party consent GATE — recording is not
      blocked from starting, and a participant who continues without explicitly
      clicking Accept is not prevented from being recorded (they can only Leave).
      This is a deliberate design choice, not an oversight; a stricter gate model
      was considered and deferred pending real customer demand.

  - id: cookie-consent-gated-analytics
    claim: >
      Native analytics (GA4/GTM) on the public booking pages is consent-gated:
      nothing loads, and no `_ga*` cookies are set, until the visitor explicitly
      accepts a cookie banner. Declining clears any analytics cookies already set.
    verify:
      - "internal/handler/templates/_shared.html — the trackingHead/consentBanner
         partials shared by book.html and manage.html."
      - "Load a booking page with GA4/GTM configured in an incognito window: the
         banner shows, and DevTools → Application → Cookies shows no _ga* cookie
         until you click Accept."
    status: verified
    caveat: >
      This claim covers the NATIVE GA4/GTM integration only. The separate
      operator-controlled 'Head HTML' code-injection field (Settings → Tracking) is
      intentionally NOT gated — it's arbitrary trusted code the operator pastes in
      themselves, equivalent to editing the template directly, and gating it isn't
      meaningful. The embed widget (embed.js) has neither native tracking nor a
      banner by design — it runs inside a customer's own website, which owns its
      own analytics and consent.

  - id: llm-no-raw-calendar-data
    claim: >
      The optional BYO-LLM layer (conversational booking, notetaker summaries) never
      sees raw calendar data or does time math itself — it only sees pre-computed
      availability/constraints and returns natural-language decisions that the
      deterministic backend executes.
    verify:
      - "internal/db/migrations/00034_llm_settings.sql, 00035_llm_instructions.sql —
         the BYO-LLM config (operator-supplied endpoint + key)."
      - "internal/handler/booking_assistant.go — the tool-loop drives
         computeSlots/createBookingForSlug (the same deterministic cores the REST
         API and MCP tools use); the LLM never queries the calendar directly."
    status: verified
    caveat: null

  - id: small-enough-to-audit
    claim: >
      Calnode's entire backend is small enough to fit in a single LLM context
      window, which is the whole premise of this audit kit — a cal.com-scale
      codebase can't do this.
    verify:
      - "Non-test Go source: ~24,000 lines / ~840KB across ~105 files (find . -name
         '*.go' -not -name '*_test.go' -not -path './frontend/*' | xargs wc -l)."
      - "Full repository (backend + SvelteKit admin frontend + tests): ~2.6MB
         tracked (git ls-files -z | xargs -0 du -cb)."
    status: verified
    caveat: >
      The frontend admin app (SvelteKit) and its ~219 npm packages are NOT included
      in the 'fits in one context' claim — that's specifically about the Go backend,
      which is the security-relevant surface (auth, data, integrations). The
      lean-dependency-tree claim below is scoped the same way.

  - id: lean-dependency-tree
    claim: >
      The Go backend has a lean dependency tree — 27 direct/indirect Go modules per
      the current SBOM, not the sprawling transitive tree typical of larger
      frameworks.
    verify:
      - "syft dir:. --exclude './frontend/**' --exclude './.git/**' -o table | grep
         golang | wc -l"
      - "go list -m all | wc -l"
    status: verified
    caveat: >
      This claim is scoped to the Go backend. The SvelteKit admin frontend pulls in
      ~219 npm packages via its build tooling (Vite, Tailwind, Vitest, etc.) — normal
      for any modern frontend, but not itself a 'lean' differentiator, and not
      blended into this claim's number.

  - id: clean-security-scan
    claim: >
      As of the date/commit above, Calnode's Go backend has zero known
      vulnerabilities in its dependencies (govulncheck), zero unresolved SAST
      findings (gosec/semgrep — every finding is either fixed or documented inline
      as a verified false positive), and zero secrets in its full git history
      (gitleaks).
    verify:
      - "See AUDIT.md's scanner command block — run it yourself and compare."
      - "gosec findings that remain are all annotated inline with `#nosec` +
         reasoning at the exact line — see commit c4c067c, which triaged and
         annotated all findings after gosec turned out not to be wired into CI
         (a real gap: 44 findings had accumulated with zero annotations before
         that commit — see its message for the full triage)."
    status: verified
    caveat: >
      A clean scan today is not a permanent guarantee — dependencies gain new CVEs
      over time, and new code can introduce new unannotated findings. All three
      deterministic scanners this claim depends on (govulncheck, gosec, gitleaks)
      are now wired into CI (.github/workflows/audit.yml) as of commit c4c067c —
      previously only govulncheck and gitleaks were, which is exactly how the 44
      unannotated gosec findings above went unnoticed. semgrep is not yet a CI gate
      (still a manual step in AUDIT.md's scanner block).

  - id: fixed-roles-admin-full-access
    claim: >
      Calnode uses a fixed three-role model (owner/admin/member) with no
      configurable permission matrix. An admin or owner has full workspace access
      across every surface — REST, MCP, and the notetaker endpoints — including
      bookings, notes, and transcripts they don't personally host. This is applied
      consistently across surfaces, not a per-endpoint inconsistency.
    verify:
      - "internal/handler/mcp_oauth.go's mcpCallerScope — fullAccess = c.IsAdmin,
         which bypasses every userHostsBooking check for MCP tools."
      - "internal/handler/notetaker_http.go's GetBookingNotes/
         RegenerateBookingNotes/GetBookingTranscript — gated by requireAdmin only,
         the same full-access model as MCP's fullAccess, not a narrower host-scoped
         check."
      - "grep -rn 'requireAdmin' internal/handler — every admin-only handler grants
         workspace-wide access; there is no per-resource permission matrix to
         misconfigure or drift out of sync."
    status: verified
    caveat: >
      Recorded here because a prior Layer 2 audit pass flagged REST's admin-only
      gate on notetaker endpoints as a "cross-host leak" relative to MCP's access
      control — it isn't; both apply the identical fixed-roles model. Configurable/
      fine-grained RBAC (e.g. "admin can manage settings but not read other hosts'
      meeting content") is a deliberate scope decision, not a gap in the current
      model — see the project's architecture notes. If your threat model requires
      restricting admins from other hosts' booking content, that needs new code
      (a permission matrix), not a fix to an existing bug.

  - id: rate-limit-keys-on-tcp-source-address
    claim: >
      Per-IP rate limiting (internal/server/middleware.go's RateLimit) keys
      strictly on the TCP-level remote address of the connection, never on client-
      supplied X-Forwarded-For/X-Real-IP headers — a client cannot spoof those
      headers to evade or split its rate-limit bucket.
    verify:
      - "internal/server/middleware.go's remoteIP — net.SplitHostPort(r.RemoteAddr)
         only; the proxy headers are never read."
      - "internal/server/ratelimit_test.go's TestRemoteIP_* — assert X-Forwarded-For
         and X-Real-IP are ignored even when RemoteAddr is loopback."
    status: verified
    caveat: >
      Recorded here because a prior Layer 2 audit pass flagged this as trusting
      spoofable proxy headers — it doesn't; the flagged behavior traced back to a
      stale doc comment describing the opposite of what the code does (fixed
      alongside this entry). Correct behavior does require the deployment's
      reverse proxy to connect to Calnode directly (or over a trusted private
      network) — see the deployment docs for reverse-proxy requirements (forward
      the original Host header, connect over a trusted path, strip client-supplied
      proxy headers at the edge).
