app = "calnode"
primary_region = "syd"

[build]

[env]
  PORT = "3000"
  DATABASE_URL = "sqlite:///data/calnode.db"

# Persistent volume — SQLite lives here.
# Create with: fly volumes create calnode_data --region syd --size 1
[[mounts]]
  source      = "calnode_data"
  destination = "/data"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/healthz"
    timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
